<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מסכת סוטה — דף יומי</title>
<meta name="description" content="לימוד דף יומי במסכת סוטה עם פירושים וכלי עזר">
<meta property="og:title" content="מסכת סוטה — דף יומי">
<meta property="og:description" content="לימוד דף יומי במסכת סוטה עם פירושים וכלי עזר">
<meta property="og:image" content="../shared/img/logo.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/png" href="../shared/img/icon.png">
<link rel="apple-touch-icon" href="../shared/img/icon.png">
<link rel="stylesheet" href="../shared/css/theme.css">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B0CQWP9MTK"></script>
<script src="../shared/js/ga.js"></script>
<style>
  .sotah-header{
    text-align:center;
    padding:1.5rem 1rem 1rem;
  }
  .sotah-header .bh{
    font-size:.75rem;
    color:var(--txt3);
    margin-bottom:.25rem;
  }
  .sotah-header h1{
    font-family:var(--font-src);
    font-size:1.8rem;
    color:var(--gold);
    margin-bottom:.25rem;
  }
  .sotah-header .sub{
    font-size:.9rem;
    color:var(--txt2);
    line-height:1.5;
    max-width:400px;
    margin:0 auto;
  }

  /* Today's daf hero */
  .today-card{
    display:block;
    text-decoration:none;
    color:inherit;
    max-width:400px;
    margin:1rem auto;
    padding:1.2rem 1.5rem;
    background:var(--gold-bg);
    border:2px solid var(--gold-border);
    border-radius:var(--r);
    text-align:center;
    transition:transform .15s, border-color .2s;
  }
  .today-card:hover{
    transform:translateY(-2px);
    border-color:var(--gold);
  }
  .today-label{
    font-size:.8rem;
    color:var(--gold);
    font-weight:700;
    letter-spacing:.5px;
    margin-bottom:.3rem;
  }
  .today-daf{
    font-family:var(--font-src);
    font-size:2rem;
    color:var(--gold);
    font-weight:700;
  }
  .today-hint{
    font-size:.8rem;
    color:var(--txt3);
    margin-top:.3rem;
  }

  /* Daf grid */
  .daf-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
    padding:0 1rem 2rem;
    max-width:500px;
    margin:0 auto;
  }
  @media(max-width:400px){
    .daf-grid{grid-template-columns:repeat(6,1fr);}
  }
  .daf-cell{
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:var(--txt);
    background:var(--card);
    border:1px solid var(--border-light);
    border-radius:8px;
    padding:10px 4px;
    font-size:.95rem;
    font-weight:500;
    transition:border-color .2s, transform .15s;
    min-height:44px;
  }
  .daf-cell:hover,.daf-cell:focus-visible{
    border-color:var(--gold);
    transform:translateY(-1px);
  }
  .daf-cell.today{
    background:var(--gold-bg);
    border-color:var(--gold);
    color:var(--gold);
    font-weight:700;
  }
  .daf-cell.visited{
    background:var(--sky-bg, #f0f6fb);
    border-color:var(--sky-border, #c8ddf0);
  }
  .daf-cell.last-studied{
    box-shadow:0 0 0 2px var(--sky, #1a5a8a);
  }

  /* Back link */
  .back-row{
    text-align:center;
    padding:0 1rem 1.5rem;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    color:var(--sky);
    text-decoration:none;
    font-size:.9rem;
    padding:.5rem 1rem;
    border:1px solid var(--border-light);
    border-radius:var(--r);
    transition:border-color .2s, color .2s;
    min-width:44px;
    min-height:44px;
  }
  .back-link:hover,.back-link:focus-visible{
    border-color:var(--gold);
    color:var(--gold);
  }

  /* Footer */
  .sotah-footer{
    text-align:center;
    padding:1rem 1rem 2rem;
    font-size:.75rem;
    color:var(--txt3);
    line-height:1.8;
    border-top:1px solid var(--border-light);
    max-width:500px;
    margin:0 auto;
  }
  .sotah-footer a{color:var(--txt3);text-decoration:underline}

  /* Topbar */
  .topbar{position:sticky;top:0;z-index:100;background:var(--overlay);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-light);padding:8px 12px}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;max-width:860px;margin:0 auto}
  .app-title{font-size:1rem;font-weight:700;color:var(--gold)}
  .font-btn{min-width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--txt2);font-family:var(--font-body);font-size:.9rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .font-btn:active{border-color:var(--gold);color:var(--gold)}
  .lang-btn{background:none;border:1px solid var(--border);color:var(--txt2);padding:6px 14px;border-radius:8px;font-family:var(--font-body);font-size:.78rem;cursor:pointer;white-space:nowrap}
  @media(max-width:400px){
    .app-title{font-size:.85rem}
    .font-btn{min-width:32px;height:32px;font-size:.8rem}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-row">
    <div style="display:flex;align-items:center;gap:8px">
      <a href="../" style="text-decoration:none;font-size:1.2rem;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--txt2)" aria-label="דף הבית">🏠</a>
      <span class="app-title">מסכת סוטה</span>
    </div>
    <div style="display:flex;gap:4px;align-items:center">
      <button class="font-btn" onclick="changeFontSize(-1)">א‎-</button>
      <button class="font-btn" onclick="changeFontSize(1)">א+</button>
      <button class="lang-btn" onclick="alert('אנגלית — בקרוב!')">עברית ▾</button>
      <button class="font-btn" onclick="if(navigator.share)navigator.share({title:'מסכת סוטה — דף יומי',url:location.href}).then(function(){RambamGA.trackShare('sotah_index','native');}).catch(function(){});else{navigator.clipboard.writeText(location.href).then(function(){alert('הקישור הועתק!');RambamGA.trackShare('sotah_index','clipboard');});}" aria-label="שיתוף" style="font-size:1rem">🔗</button>
    </div>
  </div>
</div>

<header class="sotah-header">
  <div class="sub">טקסט מקורי + ביאור מתומצת מבוסס על ביאור שטיינזלץ</div>
</header>

<a href="#" id="todayCard" class="today-card">
  <div class="today-label">הדף היומי</div>
  <div class="today-daf" id="todayDaf">—</div>
  <div class="today-hint">לחץ כדי ללמוד</div>
</a>

<section class="daf-grid" id="dafGrid"></section>


<footer class="sotah-footer">
  כל עזר זה נבנה בסיוע כלי AI. יתכנו שגיאות וטעויות מהותיות.<br>
  להערות והארות: Chanoch@maor.org<br>
  הטקסט המנוקד והביאור מבוססים על מהדורת וויליאם דוידסון באדיבות <a href="https://www.sefaria.org/william-davidson-talmud" target="_blank">ספריא</a>,
  תחת רישיון <a href="https://creativecommons.org/licenses/by-nc/4.0" target="_blank">CC-BY-NC</a>.
</footer>

<script src="../shared/js/settings.js"></script>
<script src="../shared/js/hebrew-date.js"></script>
<script src="sotah-daily.js"></script>
<script>
(function(){
  RambamSettings.applyTheme();

  var lang = RambamSettings.get('language') || 'he';
  var tz = HebrewDate.detectTZ(lang);
  var daf = SotahDaily.todaysDaf(tz);
  var hebDaf = SotahDaily.todaysDafHeb(tz);
  var url = SotahDaily.todaysDafUrl(tz);

  if(daf){
    document.getElementById('todayDaf').textContent = 'דף ' + hebDaf;
    document.getElementById('todayCard').href = url || '#';
    if(!url) document.getElementById('todayCard').style.pointerEvents = 'none';
  } else {
    document.getElementById('todayCard').style.display = 'none';
  }

  // Build grid (daf 2-49, daf 1/sha'ar has no page)
  var visited = [];
  var lastPos = null;
  try { visited = JSON.parse(localStorage.getItem('rambam_sotahVisited') || '[]'); } catch(e){}
  try { lastPos = JSON.parse(localStorage.getItem('rambam_sotahPosition')); } catch(e){}

  var grid = document.getElementById('dafGrid');
  for(var d = 2; d <= 49; d++){
    var a = document.createElement('a');
    a.href = SotahDaily.dafUrl(d);
    var cls = 'daf-cell';
    if(d === daf) cls += ' today';
    if(visited.indexOf(d) !== -1) cls += ' visited';
    if(lastPos && lastPos.daf === d) cls += ' last-studied';
    a.className = cls;
    a.textContent = SotahDaily.HEB[d];
    a.title = 'דף ' + SotahDaily.HEB[d];
    grid.appendChild(a);
  }
})();

function changeFontSize(delta){
  var el = document.body;
  var current = parseFloat(getComputedStyle(el).fontSize);
  el.style.fontSize = (current + delta) + 'px';
}
</script>
<script src="../shared/js/feedback.js"></script>
</body>
</html>
