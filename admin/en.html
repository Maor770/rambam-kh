<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Settings — Rambam Kiddush HaChodesh</title>
<link rel="stylesheet" href="../shared/css/theme.css">
<style>
/* ── Admin page styles (mobile-first, dark theme) ── */
.admin-wrap{max-width:640px;margin:0 auto;padding:0 16px 80px}

/* Top bar */
.admin-topbar{position:sticky;top:0;z-index:100;background:rgba(10,14,26,.94);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.06);padding:12px 16px;margin:0 -16px}
.admin-topbar-inner{display:flex;align-items:center;justify-content:space-between;max-width:640px;margin:0 auto}
.back-link{color:var(--sky);text-decoration:none;font-size:.9rem;font-weight:500;padding:8px 12px;margin:-8px -12px;min-height:44px;display:inline-flex;align-items:center;gap:6px;border-radius:8px;transition:background .15s}
.back-link:active{background:rgba(135,206,235,.08)}
.admin-title{font-size:1rem;font-weight:700;color:var(--gold)}
.lang-link{color:var(--sky);text-decoration:none;font-size:.85rem;font-weight:500;padding:6px 12px;border:1px solid var(--border);border-radius:8px}
.lang-link:hover{border-color:var(--gold);color:var(--gold)}

/* Section cards */
.section{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:var(--r);margin:16px 0;overflow:hidden}
.section-header{padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:10px}
.section-icon{font-size:1.1rem}
.section-title{font-size:.95rem;font-weight:700;color:var(--gold)}
.section-body{padding:16px}

/* Form rows */
.setting-row{padding:12px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:.85rem;color:var(--txt2);margin-bottom:8px;font-weight:500}

/* Slider */
.slider-wrap{display:flex;align-items:center;gap:12px}
.slider-wrap input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;background:var(--card2);border-radius:3px;outline:none}
.slider-wrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}
.slider-wrap input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--gold);cursor:pointer;border:2px solid var(--bg)}
.slider-val{min-width:40px;text-align:center;font-size:.85rem;color:var(--gold);font-weight:600}
.preview-text{font-family:var(--font-src);color:var(--silver);padding:10px 14px;background:rgba(139,92,246,.05);border-left:3px solid var(--purple);border-radius:10px 0 0 10px;margin-top:10px;line-height:2}

/* Radio group */
.radio-group{display:flex;flex-wrap:wrap;gap:8px}
.radio-opt{position:relative}
.radio-opt input{position:absolute;opacity:0;width:0;height:0}
.radio-opt label{display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;min-height:44px;min-width:44px;border-radius:10px;border:1.5px solid rgba(255,255,255,.1);background:transparent;color:var(--txt2);font-family:'Google Sans',-apple-system,sans-serif;font-size:.85rem;font-weight:500;cursor:pointer;transition:.15s;user-select:none}
.radio-opt input:checked+label{border-color:var(--gold);color:var(--gold);background:rgba(244,208,63,.06)}
.radio-opt label:active{background:rgba(255,255,255,.04)}

/* Progress bar */
.progress-wrap{margin-top:8px}
.progress-bar{height:8px;background:var(--card2);border-radius:4px;overflow:hidden;margin-bottom:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:4px;transition:width .4s ease}
.progress-label{font-size:.8rem;color:var(--txt3)}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat-card{background:var(--card2);border-radius:10px;padding:12px;text-align:center}
.stat-val{font-size:1.4rem;font-weight:700;color:var(--gold)}
.stat-name{font-size:.75rem;color:var(--txt3);margin-top:2px}

/* Bookmarks list */
.bm-list{list-style:none}
.bm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.bm-item:last-child{border-bottom:none}
.bm-info{font-size:.88rem;color:var(--txt)}
.bm-info span{color:var(--txt3);font-size:.78rem;margin-left:8px}
.bm-del{min-width:44px;min-height:44px;border:none;background:none;color:var(--red);font-size:1rem;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s}
.bm-del:active{background:rgba(239,68,68,.1)}
.empty-msg{font-size:.85rem;color:var(--txt3);text-align:center;padding:16px 0}

/* Page views table */
.views-table{width:100%;border-collapse:collapse;margin-top:8px}
.views-table th,.views-table td{text-align:left;padding:8px 6px;font-size:.82rem}
.views-table th{color:var(--txt3);font-weight:500;border-bottom:1px solid rgba(255,255,255,.06)}
.views-table td{color:var(--txt);border-bottom:1px solid rgba(255,255,255,.02)}
.views-table td:last-child{color:var(--sky);font-weight:600;text-align:center}

/* Reset button */
.reset-btn{display:block;width:100%;padding:14px;min-height:48px;border-radius:var(--r);border:1.5px solid var(--red);background:transparent;color:var(--red);font-family:'Google Sans',-apple-system,sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s;margin:24px 0}
.reset-btn:active{background:rgba(239,68,68,.1)}

/* Tablet+ */
@media(min-width:600px){
  .admin-wrap{padding:0 24px 80px}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .radio-group{gap:10px}
}
</style>
</head>
<body style="font-family:'Google Sans',-apple-system,sans-serif">
<div class="admin-wrap">

  <!-- Top bar -->
  <div class="admin-topbar">
    <div class="admin-topbar-inner">
      <a href="../en/" class="back-link">🏠 Home</a>
      <div class="admin-title">Settings</div>
      <a href="index.html" class="lang-link">עברית</a>
    </div>
  </div>

  <!-- Display Settings -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">A</span>
      <span class="section-title">Display</span>
    </div>
    <div class="section-body">

      <!-- Font size -->
      <div class="setting-row">
        <div class="setting-label">Font Size</div>
        <div class="slider-wrap">
          <span style="font-size:.75rem;color:var(--txt3)">A-</span>
          <input type="range" id="fontSlider" min="0.8" max="1.6" step="0.1" value="1.1">
          <span style="font-size:1.1rem;color:var(--txt3)">A+</span>
          <span class="slider-val" id="fontVal">1.1</span>
        </div>
        <div class="preview-text" id="fontPreview" style="font-size:1.1rem">
          Text preview — Laws of Sanctifying the Month
        </div>
      </div>

      <!-- Language -->
      <div class="setting-row">
        <div class="setting-label">Language</div>
        <div class="radio-group" id="langGroup">
          <div class="radio-opt">
            <input type="radio" name="lang" id="lang-he" value="he">
            <label for="lang-he">עברית</label>
          </div>
          <div class="radio-opt">
            <input type="radio" name="lang" id="lang-en" value="en">
            <label for="lang-en">English</label>
          </div>
          <div class="radio-opt">
            <input type="radio" name="lang" id="lang-both" value="he+en">
            <label for="lang-both">English + עברית</label>
          </div>
        </div>
      </div>

      <!-- Theme -->
      <div class="setting-row">
        <div class="setting-label">Theme</div>
        <div class="radio-group" id="themeGroup">
          <div class="radio-opt">
            <input type="radio" name="theme" id="theme-dark" value="dark">
            <label for="theme-dark">Dark</label>
          </div>
          <div class="radio-opt">
            <input type="radio" name="theme" id="theme-light" value="light">
            <label for="theme-light">Light</label>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Study Settings -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">B</span>
      <span class="section-title">Study</span>
    </div>
    <div class="section-body">
      <div class="setting-row">
        <div class="setting-label">Daily Study Track</div>
        <div class="radio-group" id="studyModeGroup">
          <div class="radio-opt">
            <input type="radio" name="studyMode" id="mode-1ch" value="1ch">
            <label for="mode-1ch">One Chapter per Day</label>
          </div>
          <div class="radio-opt">
            <input type="radio" name="studyMode" id="mode-3ch" value="3ch">
            <label for="mode-3ch">3 Chapters per Day</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Study Progress -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">C</span>
      <span class="section-title">Progress</span>
    </div>
    <div class="section-body">
      <div class="setting-row">
        <div class="setting-label">Halachot Studied</div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
          <div class="progress-label" id="progressLabel">0 / 235</div>
        </div>
      </div>

      <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
          <div class="stat-val" id="statViews">0</div>
          <div class="stat-name">Views</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statStudied">0</div>
          <div class="stat-name">Halachot</div>
        </div>
        <div class="stat-card">
          <div class="stat-val" id="statLast">&mdash;</div>
          <div class="stat-name">Last Studied</div>
        </div>
      </div>

      <div class="setting-row" id="viewsByPageRow" style="margin-top:12px">
        <div class="setting-label">Views by Page</div>
        <table class="views-table" id="viewsTable">
          <thead><tr><th>Page</th><th>Views</th></tr></thead>
          <tbody id="viewsBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Bookmarks -->
  <div class="section">
    <div class="section-header">
      <span class="section-icon">D</span>
      <span class="section-title">Bookmarks</span>
    </div>
    <div class="section-body">
      <ul class="bm-list" id="bmList"></ul>
    </div>
  </div>

  <!-- Reset -->
  <button class="reset-btn" id="resetBtn">Reset All Settings</button>

</div>

<!-- Shared scripts -->
<script src="../shared/js/settings.js"></script>
<script src="../shared/js/analytics.js"></script>
<script>
(function(){
  const S = window.RambamSettings;
  const A = window.RambamAnalytics;

  function init(){
    S.applyTheme();
    const all = S.getAll();

    // Font size
    const slider = document.getElementById('fontSlider');
    const fontVal = document.getElementById('fontVal');
    const preview = document.getElementById('fontPreview');
    slider.value = all.fontSize;
    fontVal.textContent = all.fontSize;
    preview.style.fontSize = all.fontSize + 'rem';
    slider.addEventListener('input', function(){
      const v = parseFloat(this.value);
      fontVal.textContent = v.toFixed(1);
      preview.style.fontSize = v + 'rem';
      S.set('fontSize', v);
    });

    // Language
    const langRadio = document.querySelector('input[name="lang"][value="' + all.language + '"]');
    if(langRadio) langRadio.checked = true;
    document.querySelectorAll('input[name="lang"]').forEach(function(r){
      r.addEventListener('change', function(){
        S.set('language', this.value);
        // Redirect to Hebrew page if Hebrew selected
        if(this.value === 'he') window.location.href = 'index.html';
      });
    });

    // Theme
    const themeRadio = document.querySelector('input[name="theme"][value="' + all.theme + '"]');
    if(themeRadio) themeRadio.checked = true;
    document.querySelectorAll('input[name="theme"]').forEach(function(r){
      r.addEventListener('change', function(){
        S.set('theme', this.value);
        S.applyTheme();
      });
    });

    // Daily study mode
    const modeRadio = document.querySelector('input[name="studyMode"][value="' + all.dailyStudyMode + '"]');
    if(modeRadio) modeRadio.checked = true;
    document.querySelectorAll('input[name="studyMode"]').forEach(function(r){
      r.addEventListener('change', function(){ S.set('dailyStudyMode', this.value); });
    });

    // Study progress
    loadProgress();

    // Bookmarks
    renderBookmarks(all.bookmarks);

    // Reset
    document.getElementById('resetBtn').addEventListener('click', function(){
      if(confirm('Reset all settings and return to defaults?')){
        S.reset();
        location.reload();
      }
    });
  }

  function loadProgress(){
    var total = 235;
    var studied = 0;
    var totalViews = 0;
    var lastStudied = S.get('lastStudied');
    var viewsByPage = {};

    if(A && typeof A.getStats === 'function'){
      var stats = A.getStats();
      totalViews = stats.totalViews || 0;
      lastStudied = stats.lastStudied || lastStudied;
      viewsByPage = stats.viewsByPage || {};
      var studiedArr = A.getStudiedHalachot();
      studied = studiedArr ? studiedArr.length : (stats.halachotStudied || 0);
    }

    var pct = Math.round((studied / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = studied + ' / ' + total + ' (' + pct + '%)';
    document.getElementById('statViews').textContent = totalViews;
    document.getElementById('statStudied').textContent = studied;

    if(lastStudied){
      try {
        var d = new Date(lastStudied);
        document.getElementById('statLast').textContent = d.toLocaleDateString('en-US');
      } catch(e){
        document.getElementById('statLast').textContent = lastStudied;
      }
    }

    // Views by page table
    var tbody = document.getElementById('viewsBody');
    var pages = Object.keys(viewsByPage);
    if(pages.length === 0){
      document.getElementById('viewsByPageRow').style.display = 'none';
    } else {
      pages.sort(function(a,b){ return viewsByPage[b] - viewsByPage[a]; });
      tbody.innerHTML = '';
      pages.forEach(function(p){
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>' + p + '</td><td>' + viewsByPage[p] + '</td>';
        tbody.appendChild(tr);
      });
    }
  }

  function renderBookmarks(bookmarks){
    var list = document.getElementById('bmList');
    var keys = bookmarks ? Object.keys(bookmarks) : [];
    if(keys.length === 0){
      list.innerHTML = '<li class="empty-msg">No saved bookmarks</li>';
      return;
    }
    list.innerHTML = '';
    keys.forEach(function(key){
      var li = document.createElement('li');
      li.className = 'bm-item';
      var info = document.createElement('div');
      info.className = 'bm-info';
      var label = bookmarks[key] && bookmarks[key].label ? bookmarks[key].label : key;
      info.textContent = label;
      if(label !== key){
        var sp = document.createElement('span');
        sp.textContent = key;
        info.appendChild(sp);
      }
      var del = document.createElement('button');
      del.className = 'bm-del';
      del.setAttribute('aria-label', 'Delete bookmark');
      del.innerHTML = '&#x2715;';
      del.addEventListener('click', function(){
        var bm = S.get('bookmarks') || {};
        delete bm[key];
        S.set('bookmarks', bm);
        renderBookmarks(bm);
      });
      li.appendChild(info);
      li.appendChild(del);
      list.appendChild(li);
    });
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
