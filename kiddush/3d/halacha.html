<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>הלכות קידוש החודש — פרקים יא-טו בתלת מימד</title>
<meta name="description" content="כל הלכה מפרקים יא-טו עם הסבר ויזואלי תלת מימדי">
<link rel="icon" type="image/png" href="../../shared/img/icon.png">
<link rel="apple-touch-icon" href="../../shared/img/icon.png">
<link rel="stylesheet" href="../css/style.css?v=9">
<link rel="stylesheet" href="../css/observatory.css?v=4">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B0CQWP9MTK"></script>
<script src="../../shared/js/ga.js"></script>
<script>
function shareApp(){
  var data = {title:'הלכות קידוש החודש — תלת מימד',text:'כל הלכה עם הסבר ויזואלי',url:location.href};
  if(navigator.share) navigator.share(data).catch(function(){});
  else { navigator.clipboard.writeText(location.href).then(function(){alert('הקישור הועתק!');}); }
}
var obsLang = 'he';
function toggleLang(){
  obsLang = obsLang === 'he' ? 'en' : 'he';
  document.getElementById('langBtn').textContent = obsLang === 'he' ? 'English' : 'עברית';
  document.documentElement.lang = obsLang === 'he' ? 'he' : 'en';
  document.documentElement.dir = obsLang === 'he' ? 'rtl' : 'ltr';
  if(window.updateHalachaLang) updateHalachaLang();
}
</script>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div style="display:flex;align-items:center;gap:8px">
      <a href="../../" style="text-decoration:none;font-size:1.2rem;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;color:var(--txt2)" aria-label="דף הבית">🏠</a>
      <span class="app-title">הלכות קידוש החודש</span>
    </div>
    <div style="display:flex;gap:4px;align-items:center">
      <button class="font-btn" onclick="shareApp()" aria-label="שיתוף" style="font-size:1rem">🔗</button>
    </div>
  </div>
  <div class="mode-tabs">
    <a href="../" class="mode-tab" style="text-decoration:none;color:var(--txt3);display:flex;align-items:center;justify-content:center">🔭 סקירה</a>
    <a href="../" class="mode-tab" style="text-decoration:none;color:var(--txt3);display:flex;align-items:center;justify-content:center">📜 הלכות</a>
    <a href="./" class="mode-tab" style="text-decoration:none;color:var(--txt3);display:flex;align-items:center;justify-content:center">🌍 סיפור 5 דקות</a>
    <button class="mode-tab active">📖 הלכה-הלכה</button>
  </div>
</div>

<!-- 3D MODEL -->
<div class="obs-3d-page">
  <div class="obs-3d-model">
    <div id="obs-canvas"></div>
    <div class="obs-camera-btns">
      <button class="cam-btn" onclick="obsCameraPreset('overview')" title="מבט כללי">🌐</button>
      <button class="cam-btn" onclick="obsCameraPreset('moonClose')" title="ירח">🌙</button>
      <button class="cam-btn" onclick="obsCameraPreset('sunOrbit')" title="שמש">☀️</button>
      <button class="cam-btn" onclick="obsCameraPreset('zodiacWide')" title="מזלות">♈</button>
      <button class="cam-btn" onclick="obsCameraPreset('top')" title="מלמעלה">⬆</button>
    </div>
  </div>

  <!-- BOTTOM PANEL -->
  <div class="obs-3d-bottom">

    <!-- RIGHT: language + chapter selector -->
    <div class="obs-3d-right">
      <button class="lang-toggle" id="langBtn" onclick="toggleLang()">English</button>
      <select id="chapterSelect" class="obs-ch-select" onchange="jumpToChapter(parseInt(this.value))">
        <option value="11">פרק יא — יסודות</option>
        <option value="12">פרק יב — שמש אמצעי</option>
        <option value="13">פרק יג — שמש אמיתי</option>
        <option value="14">פרק יד — ירח אמצעי</option>
        <option value="15">פרק טו — ירח אמיתי</option>
      </select>
      <div id="obs-layer-toggles" class="obs-3d-layers"></div>
    </div>

    <!-- CENTER: halacha card + player -->
    <div class="obs-3d-center">
      <div id="halacha-card" class="obs-story-inline"></div>
      <div class="obs-3d-player">
        <button id="obs-play-btn" class="obs-ctrl-btn" title="הפעל">▶</button>
        <input type="range" id="obs-time-slider" min="0" max="6939" step="0.5" value="0" class="obs-ctrl-slider">
        <div class="obs-ctrl-presets">
          <button data-time-preset="0">0</button>
          <button data-time-preset="29.53">29</button>
          <button data-time-preset="354">354</button>
        </div>
        <input type="range" id="obs-speed-slider" min="0.2" max="20" step="0.2" value="1" class="obs-ctrl-slider obs-ctrl-speed">
        <span id="obs-speed-label" class="obs-ctrl-label">×1</span>
      </div>
    </div>

    <!-- LEFT: info -->
    <div class="obs-3d-left">
      <div id="obs-day-info" class="obs-day-info-inline"></div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../../shared/js/settings.js"></script>
<script src="../js/observatory-concepts.js"></script>
<script src="../js/observatory-scene.js"></script>
<script src="../js/observatory-halacha.js"></script>

</body>
</html>
