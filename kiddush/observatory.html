<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>מצפה כוכבים — הלכות קידוש החודש</title>
<meta name="description" content="מודל תלת-ממדי אינטראקטיבי של מערכת השמש, הירח והמזלות — כל המושגים מהלכות קידוש החודש">
<link rel="icon" type="image/png" href="../shared/img/icon.png">
<link rel="apple-touch-icon" href="../shared/img/icon.png">
<link rel="stylesheet" href="../shared/css/theme.css">
<link rel="stylesheet" href="css/observatory.css">
</head>
<body data-theme="dark">

<div class="obs-page">

  <!-- ── 3D Canvas Area ── -->
  <div class="obs-main">
    <div class="obs-canvas-wrap">
      <div id="obs-canvas"></div>

      <!-- Floating info -->
      <div id="obs-day-info"></div>

      <!-- Story mode button -->
      <button class="obs-story-btn" onclick="startStory()">📖 מצב סיפור</button>

      <!-- Back to main -->
      <a class="obs-back-btn" href="index.html">← חזרה</a>

      <!-- Camera presets -->
      <div class="obs-camera-btns">
        <button class="cam-btn" onclick="obsCameraPreset('overview')" title="מבט כללי">🌐</button>
        <button class="cam-btn" onclick="obsCameraPreset('moonClose')" title="קרוב לירח">🌙</button>
        <button class="cam-btn" onclick="obsCameraPreset('sunOrbit')" title="מסלול השמש">☀️</button>
        <button class="cam-btn" onclick="obsCameraPreset('zodiacWide')" title="גלגל המזלות">♈</button>
        <button class="cam-btn" onclick="obsCameraPreset('top')" title="מלמעלה">⬆</button>
      </div>

      <!-- Story mode overlay -->
      <div id="obs-story-overlay"></div>
    </div>

    <!-- Layer toggles -->
    <div id="obs-layer-toggles"></div>

    <!-- Timeline controls -->
    <div class="obs-timeline">
      <button id="obs-play-btn" title="השהה">⏸</button>
      <input type="range" id="obs-time-slider" min="0" max="6939" step="0.5" value="0">
      <div class="time-presets">
        <button data-time-preset="0" title="יום 0">0</button>
        <button data-time-preset="29.53" title="חודש אחד">29</button>
        <button data-time-preset="354" title="שנה">354</button>
        <button data-time-preset="6939" title="מחזור 19">19y</button>
      </div>
      <input type="range" id="obs-speed-slider" min="0.2" max="20" step="0.2" value="1">
      <span id="obs-speed-label">×1</span>
    </div>
  </div>

  <!-- ── Side Panel: Concepts ── -->
  <div class="obs-sidebar">
    <div class="obs-sidebar-header">
      <h2>מושגים אסטרונומיים</h2>
      <span class="subtitle">כל המושגים מהלכות קידוש החודש — לחץ על מושג לראות אותו בתלת-ממד</span>
      <input type="search" class="obs-search" placeholder="חיפוש מושג..."
             oninput="filterConcepts(this.value)">
    </div>

    <div class="obs-concepts-scroll" id="obs-concepts-list">
      <!-- Populated by observatory-timeline.js -->
    </div>

    <!-- Detail panel (expands when concept selected) -->
    <div id="obs-detail"></div>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="../shared/js/settings.js"></script>
<script src="js/observatory-concepts.js"></script>
<script src="js/observatory-scene.js"></script>
<script src="js/observatory-timeline.js"></script>

</body>
</html>
