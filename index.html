<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בית המדרש — רמב״ם יומי</title>
<link rel="stylesheet" href="shared/css/theme.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap">
<style>
  body{ font-family: 'Google Sans', var(--font-body); }
  .home-header{
    text-align:center;
    padding:2rem 1rem 1rem;
  }
  .home-header h1{
    font-family:'Google Sans', var(--font-body);
    font-size:2rem;
    color:var(--gold);
    margin-bottom:.25rem;
  }
  .header-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:.75rem;
  }
  .gear-link{
    color:var(--txt3);
    text-decoration:none;
    font-size:1.5rem;
    min-width:44px;
    min-height:44px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    transition:color .2s;
  }
  .gear-link:hover{ color:var(--gold); }

  /* Date display */
  .date-block{
    text-align:center;
    padding:0 1rem 1.5rem;
  }
  .date-hebrew{
    font-family:'Google Sans', var(--font-body);
    font-size:1.5rem;
    color:var(--gold);
    font-weight:700;
  }
  .date-greg{
    font-size:.95rem;
    color:var(--txt2);
    margin-top:.15rem;
  }

  /* Card grid */
  .card-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:1rem;
    padding:0 1rem 2rem;
    max-width:700px;
    margin:0 auto;
  }
  @media(min-width:600px){
    .card-grid{ grid-template-columns:1fr 1fr; }
  }
  .card-link{
    display:block;
    text-decoration:none;
    color:inherit;
    background:var(--card);
    border-radius:var(--r);
    padding:1.5rem;
    border:1px solid var(--border);
    box-shadow:0 2px 8px var(--shadow);
    transition:border-color .2s, transform .15s;
    min-height:44px;
  }
  .card-link:hover, .card-link:focus-visible{
    border-color:var(--gold);
    transform:translateY(-2px);
  }
  .card-icon{
    font-size:2rem;
    margin-bottom:.5rem;
    display:block;
  }
  .card-title{
    font-family:'Google Sans', var(--font-body);
    font-size:1.2rem;
    color:var(--txt);
    font-weight:700;
    margin-bottom:.35rem;
  }
  .card-desc{
    font-size:.9rem;
    color:var(--txt2);
    line-height:1.5;
  }
  .badge{
    display:inline-block;
    background:var(--purple);
    color:#fff;
    font-size:.7rem;
    padding:.15rem .5rem;
    border-radius:999px;
    margin-right:.4rem;
    vertical-align:middle;
  }
  .card-today{
    margin-top:.5rem;
    padding:.4rem .7rem;
    background:var(--gold-bg);
    border:1px solid var(--gold-border);
    border-radius:8px;
    font-size:.85rem;
    color:var(--gold);
    font-weight:600;
  }

  /* Footer */
  .home-footer{
    text-align:center;
    padding:1.5rem 1rem 2rem;
    font-size:.8rem;
    color:var(--txt3);
  }
</style>
</head>
<body>

<header class="home-header">
  <div style="text-align:center;font-size:.65rem;color:var(--txt3);margin-bottom:2px">ב״ה</div>
  <div class="header-row">
    <h1>בית המדרש החבדי</h1>
    <a href="admin/index.html" class="gear-link" aria-label="הגדרות">&#x2699;</a>
  </div>
</header>

<section class="date-block">
  <div class="date-hebrew" id="dateHebrew">—</div>
  <div class="date-greg" id="dateGreg">—</div>
</section>

<section class="card-grid">
  <a href="kiddush/" class="card-link" id="rambamCard">
    <span class="card-icon" aria-hidden="true">&#127769;</span>
    <div class="card-title">הלכות קידוש החודש</div>
    <div class="card-desc">לימוד יומי בהלכות קידוש החודש לרמב״ם, עם ביאורים ותרשימים אינטראקטיביים.</div>
    <div class="card-today" id="rambamToday" style="display:none"></div>
  </a>
  <a href="sotah/" class="card-link" id="sotahCard">
    <span class="card-icon" aria-hidden="true">&#128220;</span>
    <div class="card-title">מסכת סוטה — דף יומי</div>
    <div class="card-desc">לימוד דף יומי במסכת סוטה עם פירושים וכלי עזר.</div>
    <div class="card-today" id="sotahToday" style="display:none"></div>
  </a>
</section>

<footer class="home-footer">
  נבנה לזכות ההתגלות של הרבי מלך המשיח, נאו! &bull; תשפ״ו
  <br><span style="color:var(--gold);font-weight:500">גירסת בטא</span> &mdash; הערות והארות יתקבלו בברכה: <a href="mailto:chanoch@maor.org" style="color:var(--sky);text-decoration:none">chanoch@maor.org</a>
</footer>

<script src="shared/js/settings.js"></script>
<script src="shared/js/hebrew-date.js"></script>
<script src="shared/js/analytics.js"></script>
<script src="sotah/sotah-daily.js"></script>
<script>
(function(){
  RambamSettings.applyTheme();
  RambamAnalytics.trackPageView('home');

  var lang = RambamSettings.get('language') || 'he';
  var tz = HebrewDate.detectTZ(lang);

  function updateDate(){
    try {
      var d = HebrewDate.today(tz);
      var isHe = lang === 'he';
      var dow = isHe ? d.dowHe : d.dowEn;
      var greg = isHe ? d.gregorian : d.gregorianEn;
      document.getElementById('dateHebrew').textContent = dow + ' | ' + d.hebrew;
      document.getElementById('dateGreg').textContent = greg;
    } catch(e){
      console.error('HebrewDate error:', e);
    }
  }

  function scheduleRefresh(){
    var ms = HebrewDate.msUntilMidnight(tz);
    setTimeout(function(){
      updateDate();
      scheduleRefresh();
    }, ms + 1000);
  }

  updateDate();
  scheduleRefresh();

  // --- Sotah: today's daf ---
  try {
    var daf = SotahDaily.todaysDaf();
    var hebDaf = SotahDaily.todaysDafHeb();
    var sotahEl = document.getElementById('sotahToday');
    sotahEl.textContent = 'היום: דף ' + hebDaf;
    sotahEl.style.display = '';
    document.getElementById('sotahCard').href = 'sotah/' + SotahDaily.todaysDafUrl();
  } catch(e){ console.error('SotahDaily error:', e); }

  // --- Rambam: today's 3 chapters from Sefaria ---
  var d = HebrewDate.today(tz);
  fetch('https://www.sefaria.org/api/calendars?year=' + d.gYear + '&month=' + d.gMonth + '&day=' + d.gDay + '&timezone=' + encodeURIComponent(tz))
    .then(function(r){ return r.json(); })
    .then(function(data){
      var items = data.calendar_items || [];
      var rambam3 = null;
      for(var i = 0; i < items.length; i++){
        if(items[i].title && items[i].title.en === 'Daily Rambam (3 Chapters)'){
          rambam3 = items[i]; break;
        }
      }
      if(!rambam3) return;
      var rambamEl = document.getElementById('rambamToday');
      var heDisplay = rambam3.displayValue && rambam3.displayValue.he ? rambam3.displayValue.he : '';
      rambamEl.textContent = 'היום: ' + heDisplay;
      rambamEl.style.display = '';
    })
    .catch(function(e){ console.error('Sefaria error:', e); });
})();
</script>
<script src="shared/js/feedback.js"></script>
</body>
</html>
